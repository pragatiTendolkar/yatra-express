<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj Mahal — 360° VR</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100vw; height:100vh; overflow:hidden; background:#000; font-family:'DM Sans',sans-serif; }
#wrap { width:100%; height:100vh; position:relative; overflow:hidden; }
canvas#vrCanvas { width:100%!important; height:100%!important; display:block; cursor:grab; touch-action:none; }
canvas#vrCanvas.grabbing { cursor:grabbing; }

/* Entry overlay */
#overlay {
  position:absolute; inset:0; z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.85);
  transition:opacity 0.5s;
}
#overlay.gone { opacity:0; pointer-events:none; }
.ov-ring {
  width:72px; height:72px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.22);
  display:flex; align-items:center; justify-content:center; margin-bottom:20px;
}
.ov-title { font-family:'Playfair Display',serif; font-size:26px; color:#fff; margin-bottom:6px; }
.ov-sub { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.38); margin-bottom:30px; }
#startBtn {
  padding:12px 36px; background:#d4a853; color:#000;
  border:none; border-radius:6px; font-size:13px; font-weight:500;
  letter-spacing:1px; cursor:pointer; transition:background .2s;
}
#startBtn:hover { background:#f0c878; }

/* Top bar */
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:10;
  padding:22px 34px;
  display:none; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom,rgba(0,0,0,0.72),transparent);
  pointer-events:none;
}
.tb-left .ttl { font-family:'Playfair Display',serif; font-size:26px; color:#f7f3ee; }
.tb-left .ttl em { font-style:italic; color:#d4a853; }
.tb-left .sub { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(247,243,238,0.38); margin-top:5px; }
.ic-btn {
  pointer-events:all;
  width:40px; height:40px; border-radius:50%;
  background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); transition:background .2s, border-color .2s;
}
.ic-btn:hover { background:rgba(212,168,83,.25); border-color:#d4a853; }

/* Thumb strip */
#thumbbar {
  position:absolute; bottom:0; left:0; right:0; z-index:10;
  display:none; flex-direction:column; gap:10px;
  padding:14px 34px 22px;
  background:linear-gradient(to top,rgba(0,0,0,0.88) 60%,transparent);
}
.tb-lbl { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.28); }
#thumbs { display:flex; gap:10px; }
.thumb {
  width:90px; height:58px; border-radius:6px; overflow:hidden;
  cursor:pointer; flex-shrink:0; position:relative;
  border:2px solid rgba(255,255,255,0.08);
  transition:border-color .2s, transform .2s;
}
.thumb img { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(.55); transition:filter .2s; pointer-events:none; }
.thumb:hover { border-color:rgba(212,168,83,.5); transform:translateY(-3px); }
.thumb:hover img { filter:brightness(.88); }
.thumb.active { border-color:#d4a853; transform:translateY(-5px); }
.thumb.active img { filter:brightness(.95); }
.thumb-n { position:absolute; bottom:4px; right:6px; font-size:9px; color:rgba(255,255,255,0.5); }

/* Spinner */
#spin {
  position:absolute; inset:0; z-index:15;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.5);
}
#spin.on { display:flex; }
.sp { width:38px; height:38px; border-radius:50%; border:2px solid rgba(255,255,255,0.1); border-top-color:#d4a853; animation:rot .7s linear infinite; }
@keyframes rot { to{ transform:rotate(360deg); } }

/* Hint */
#hint {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:8; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  transition:opacity .5s;
}
#hint.gone { opacity:0; }
.h-ring {
  width:56px; height:56px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.18);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:rgba(255,255,255,0.4);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.h-txt { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.28); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="vrCanvas" touch-action="none"></canvas>

  <!-- ══════════════════════════════════
       SWAP src= ON THESE IMG TAGS
       to change your 360° photos
  ══════════════════════════════════ -->
  <div id="img-gallery" style="display:none">
    <img src="14_706523.jpg" alt="View 1">
    <img src="14_661215.jpg" alt="View 2">
    <img src="14_706523.jpg" alt="View 3">
    <img src="14_506522.jpg" alt="View 4">
    <img src="14_146066.jpg" alt="View 5">
    <img src="14_905499.jpg" alt="View 6">
  </div>

  <div id="overlay">
    <div class="ov-ring">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </div>
    <div class="ov-title">Taj Mahal</div>
    <div class="ov-sub">360° · Drag to look around · Scroll to zoom</div>
    <button id="startBtn">Enter 360° Experience</button>
  </div>

  <div id="spin"><div class="sp"></div></div>

  <div id="topbar">
    <div class="tb-left">
      <div class="ttl">Taj <em>Mahal</em></div>
      <div class="sub" id="vlabel">View 1 of 6</div>
    </div>
    <div class="ic-btn" id="fsBtn">⛶</div>
  </div>

  <div id="hint">
    <div class="h-ring">✛</div>
    <div class="h-txt">Drag in any direction</div>
  </div>

  <div id="thumbbar">
    <span class="tb-lbl">Views — click to switch</span>
    <div id="thumbs"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Collect images from gallery ──
const imgs = Array.from(document.querySelectorAll('#img-gallery img'));

// ── Build thumbnails ──
const thumbsEl = document.getElementById('thumbs');
imgs.forEach((img, i) => {
  const t = document.createElement('div');
  t.className = 'thumb' + (i===0?' active':'');
  t.innerHTML = `<img src="${img.src}" loading="lazy"><span class="thumb-n">${i+1}</span>`;
  t.addEventListener('click', () => switchView(i));
  thumbsEl.appendChild(t);
});

// ── Three.js ──
const vrCanvas = document.getElementById('vrCanvas');
const wrap = document.getElementById('wrap');
const W = () => wrap.offsetWidth;
const H = () => wrap.offsetHeight;

const renderer = new THREE.WebGLRenderer({ canvas: vrCanvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(90, W()/H(), 0.1, 1000);
camera.position.set(0, 0, 0.01);

const geo = new THREE.SphereGeometry(500, 64, 40);
geo.scale(-1, 1, 1);

let mesh = null, currentTex = null;
let lon=0, lat=0, targetLon=0, targetLat=0, fov=90;
let isDrag=false, prevX=0, prevY=0, touchPrev=null;
let started=false, currentIdx=-1, hintGone=false;

// ── KEY FIX: load image via canvas to bypass CORS ──
// Draws the <img> element onto an offscreen canvas,
// then creates a CanvasTexture — no CORS needed.
function imgToTexture(imgEl, cb) {
  const doIt = () => {
    try {
      const oc = document.createElement('canvas');
      oc.width  = imgEl.naturalWidth  || 2048;
      oc.height = imgEl.naturalHeight || 1024;
      const ctx = oc.getContext('2d');
      ctx.drawImage(imgEl, 0, 0, oc.width, oc.height);
      const tex = new THREE.CanvasTexture(oc);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      cb(tex);
    } catch(e) {
      // canvas tainted — try TextureLoader as fallback
      const loader = new THREE.TextureLoader();
      loader.crossOrigin = '';
      loader.load(imgEl.src, t => {
        t.minFilter = THREE.LinearFilter;
        t.magFilter = THREE.LinearFilter;
        cb(t);
      }, undefined, () => cb(null));
    }
  };

  if (imgEl.complete && imgEl.naturalWidth > 0) {
    doIt();
  } else {
    imgEl.onload  = doIt;
    imgEl.onerror = () => cb(null);
  }
}

// ── Switch view ──
function switchView(idx) {
  if (idx === currentIdx) return;
  currentIdx = idx;

  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('vlabel').textContent = `View ${idx+1} of ${imgs.length}`;
  targetLon=0; targetLat=0; lon=0; lat=0;

  document.getElementById('spin').classList.add('on');

  imgToTexture(imgs[idx], tex => {
    document.getElementById('spin').classList.remove('on');
    if (!tex) { alert('Image failed to load. Please check the src URL.'); return; }

    if (mesh) {
      if (currentTex) currentTex.dispose();
      mesh.material.map = tex;
      mesh.material.needsUpdate = true;
    } else {
      mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: tex }));
      scene.add(mesh);
    }
    currentTex = tex;
  });
}

// ── Start ──
document.getElementById('startBtn').addEventListener('click', () => {
  if (started) return;
  started = true;
  document.getElementById('overlay').classList.add('gone');
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('thumbbar').style.display = 'flex';
  switchView(0);
  animate();
});

// ── Mouse drag ──
vrCanvas.addEventListener('mousedown', e => {
  isDrag=true; prevX=e.clientX; prevY=e.clientY;
  vrCanvas.classList.add('grabbing'); e.preventDefault();
});
window.addEventListener('mouseup', () => { isDrag=false; vrCanvas.classList.remove('grabbing'); });
window.addEventListener('mousemove', e => {
  if (!isDrag) return;
  targetLon -= (e.clientX-prevX)*0.25;
  targetLat += (e.clientY-prevY)*0.25;
  prevX=e.clientX; prevY=e.clientY;
  if (!hintGone) { hintGone=true; document.getElementById('hint').classList.add('gone'); }
});

// ── Touch drag ──
vrCanvas.addEventListener('touchstart', e => {
  if (e.touches.length===1) touchPrev={x:e.touches[0].clientX, y:e.touches[0].clientY};
}, {passive:true});
vrCanvas.addEventListener('touchmove', e => {
  if (!touchPrev || e.touches.length!==1) return;
  targetLon -= (e.touches[0].clientX-touchPrev.x)*0.25;
  targetLat += (e.touches[0].clientY-touchPrev.y)*0.25;
  touchPrev={x:e.touches[0].clientX, y:e.touches[0].clientY};
  if (!hintGone) { hintGone=true; document.getElementById('hint').classList.add('gone'); }
}, {passive:true});

// ── Scroll zoom ──
vrCanvas.addEventListener('wheel', e => {
  fov = Math.min(120, Math.max(40, fov + e.deltaY*0.05));
  camera.fov=fov; camera.updateProjectionMatrix();
}, {passive:true});

// ── Fullscreen ──
document.getElementById('fsBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) wrap.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
});

// ── Resize ──
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
});

// ── Arrow keys ──
window.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') switchView(Math.min(currentIdx+1, imgs.length-1));
  if (e.key==='ArrowLeft')  switchView(Math.max(currentIdx-1, 0));
});

// ── Render loop ──
function animate() {
  requestAnimationFrame(animate);
  lon += (targetLon-lon)*0.07;
  lat += (targetLat-lat)*0.07;
  lat = Math.max(-85, Math.min(85, lat));
  const phi   = THREE.MathUtils.degToRad(90-lat);
  const theta = THREE.MathUtils.degToRad(lon);
  camera.lookAt(
    500*Math.sin(phi)*Math.cos(theta),
    500*Math.cos(phi),
    500*Math.sin(phi)*Math.sin(theta)
  );
  renderer.render(scene, camera);
}
</script>
</body>
</html>
